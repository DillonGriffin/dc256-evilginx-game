<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DC256 Portal Login</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Employee Portal</strong>
      <span>Fake target login</span>
    </div>
    <nav class="nav">
      <a href="/">Game</a>
      <a href="/scoreboard.html">Scoreboard</a>
      <a href="/osint.html">OSINT</a>
      <a href="/mail.html">Mail</a>
      <a href="/login.html">Login</a>
      <a href="/submit.html">Submit Flag</a>
    </nav>
  </header>

  <main class="two-col">
    <section class="panel pad">
      <h1 id="serviceTitle">Sign in.</h1>
      <p id="serviceCopy" class="muted">Synthetic employee portal.</p>
      <form id="loginForm">
        <label>Email
          <input id="email" name="email" autocomplete="username" required>
        </label>
        <label>Password
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <label>Team name
          <input id="participant" autocomplete="off">
        </label>
        <button type="submit">Sign In</button>
      </form>
    </section>

    <aside class="panel pad">
      <h2>Flag</h2>
      <div id="result" class="result">Use credentials captured through the lab flow.</div>
      <p class="muted" style="margin-top: 14px;">Submit the returned flag on the Breach Map.</p>
    </aside>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    const serviceId = new URLSearchParams(location.search).get("service");
    DC256.loadServices().then((data) => {
      const service = data.services.find((item) => item.id === serviceId);
      if (service) {
        DC256.$("#serviceTitle").textContent = `${service.name} sign in.`;
        DC256.$("#serviceCopy").textContent = service.clue;
        document.title = `${service.name} Login`;
      }
    });

    const participant = DC256.$("#participant");
    participant.value = DC256.participantName();
    participant.addEventListener("change", () => DC256.setParticipant(participant.value));

    DC256.$("#loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const result = DC256.$("#result");
      try {
        const data = await DC256.api("/api/login", {
          method: "POST",
          body: JSON.stringify({
            email: DC256.$("#email").value,
            password: DC256.$("#password").value,
            participant: DC256.setParticipant(participant.value),
            mode: "participant",
            service: serviceId || "portal"
          })
        });
        DC256.showResult(result, `${data.message}\n\n${data.flag}`, true);
      } catch (error) {
        DC256.showResult(result, error.message, false);
      }
    });
  </script>
</body>
</html>
