<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Flag</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Flag Intake</strong>
      <span>Unlock Breach Map nodes</span>
    </div>
    <nav class="nav">
      <a href="/">Game</a>
      <a href="/osint.html">OSINT</a>
      <a href="/mail.html">Mail</a>
      <a href="/login.html">Login</a>
      <a href="/submit.html">Submit Flag</a>
    </nav>
  </header>

  <main class="two-col">
    <section class="panel pad">
      <h1>Submit a flag.</h1>
      <form id="flagForm">
        <label>Team name
          <input id="participant" autocomplete="off">
        </label>
        <label>Flag
          <input id="flag" placeholder="DC256{...}" required>
        </label>
        <button type="submit">Unlock Node</button>
      </form>
      <div id="result" class="result" style="margin-top: 16px;">Waiting for a flag.</div>
    </section>

    <aside class="panel pad">
      <h2>Current Board</h2>
      <div class="grid">
        <div class="panel stat"><span class="muted">Nodes</span><strong id="solvedCount">0/150</strong></div>
        <div class="panel stat"><span class="muted">Points</span><strong id="totalPoints">0</strong></div>
        <div class="panel stat"><span class="muted">Keys</span><strong id="keysEarned">0/6</strong></div>
        <div class="panel stat"><span class="muted">Final</span><strong id="finalStatus">Locked</strong></div>
      </div>
      <div id="leaderboard" class="scoreboard compact" style="margin-top: 16px;"></div>
    </aside>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    const participant = DC256.$("#participant");
    participant.value = DC256.participantName();
    participant.addEventListener("change", () => DC256.setParticipant(participant.value));

    async function refresh() {
      DC256.renderState(await DC256.loadState());
    }
    refresh();

    DC256.$("#flagForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const result = DC256.$("#result");
      try {
        const data = await DC256.api("/api/flag", {
          method: "POST",
          body: JSON.stringify({
            participant: DC256.setParticipant(participant.value),
            flag: DC256.$("#flag").value
          })
        });
        if (data.final) {
          DC256.showResult(result, data.message, true);
        } else {
          DC256.showResult(result, `${data.message}\n${data.account.email} awarded ${data.account.points} points.`, true);
        }
        DC256.$("#flag").value = "";
        await refresh();
      } catch (error) {
        DC256.showResult(result, error.message, false);
      }
    });
  </script>
</body>
</html>
